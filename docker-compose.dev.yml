services:
  # Only the db needed for local development - run apps with pnpm run dev at the root
  db:
    image: postgres:latest
    container_name: tmr-web_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tmr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example_password}
      POSTGRES_DB: ${POSTGRES_DB:-tmrdb}
    ports:
      - "5433:5432"
    volumes:
      - dev_db_data:/var/lib/postgresql

volumes:
  dev_db_data:
